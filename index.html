<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lexi AI • Web3 Degen Companion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      transition: background 0.4s;
    }
    .logo-font { font-family: 'Space Grotesk', sans-serif; }
    
    .chat-container { max-width: 920px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
    .message {
      max-width: 82%;
      padding: 16px 22px;
      border-radius: 22px;
      margin-bottom: 18px;
      line-height: 1.55;
      animation: fadeIn 0.3s ease;
    }
    .user { background: #7c3aed; color: white; align-self: flex-end; border-bottom-right-radius: 6px; }
    .lexi { background: #2a1b4a; border: 1px solid #a78bfa; align-self: flex-start; border-bottom-left-radius: 6px; }
    
    .input-area { background: #1a0f2e; border-top: 1px solid #6b46c1; }
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #6b46c1; border-radius: 20px; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gradient-to-br from-[#0f0a1f] to-[#1a0f2e] text-white min-h-screen">

<div class="chat-container p-4">
  <!-- Header -->
  <div class="flex items-center justify-between py-5 border-b border-purple-800">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 bg-gradient-to-br from-violet-500 via-fuchsia-500 to-pink-500 rounded-3xl flex items-center justify-center text-3xl shadow-xl">✨</div>
      <div>
        <h1 class="logo-font text-4xl font-semibold tracking-tight">Lexi AI</h1>
        <p class="text-purple-400 text-sm flex items-center gap-2">
          <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
          Online • Web3 + Degen Mode
        </p>
      </div>
    </div>
    
    <div class="flex items-center gap-4">
      <button onclick="toggleTheme()" id="themeBtn"
        class="px-5 py-2.5 bg-white/10 hover:bg-white/20 rounded-2xl transition-all flex items-center gap-2 text-sm">
        <i class="fas fa-moon"></i> <span>Dark</span>
      </button>
      <button onclick="clearChat()" 
        class="px-5 py-2.5 bg-white/10 hover:bg-white/20 rounded-2xl transition-all text-sm flex items-center gap-2">
        <i class="fas fa-trash"></i> Clear
      </button>
    </div>
  </div>

  <!-- Chat Area -->
  <div id="chat" class="flex-1 overflow-y-auto py-8 space-y-6 px-4 custom-scroll"></div>

  <!-- Input -->
  <div class="input-area p-5">
    <div class="flex gap-3">
      <button onclick="startVoiceInput()" id="voiceBtn"
        class="w-14 h-14 bg-purple-600 hover:bg-purple-700 rounded-3xl flex items-center justify-center text-2xl transition-all active:scale-95">
        <i class="fas fa-microphone"></i>
      </button>
      
      <input id="userInput" type="text"
        class="flex-1 bg-[#2a1b4a] border border-purple-700 focus:border-purple-500 rounded-3xl px-7 py-5 text-lg outline-none placeholder-gray-400"
        placeholder="Ask me anything... (memecoins, fashion, degen tips...)"
        onkeypress="if(event.key === 'Enter') sendMessage()">
      
      <button onclick="sendMessage()" 
        class="w-14 h-14 bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-700 hover:to-fuchsia-700 rounded-3xl flex items-center justify-center text-2xl transition-all active:scale-95">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
    <p class="text-center text-purple-400 text-xs mt-4">Lexi AI can help with Web3, memecoins, NFTs, fashion, and degen life</p>
  </div>
</div>

<script>
// ============== THEME ==============
let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  if (isDark) {
    document.documentElement.style.setProperty('background', 'linear-gradient(to bottom right, #0f0a1f, #1a0f2e)');
    document.getElementById('themeBtn').innerHTML = `<i class="fas fa-moon"></i> <span>Dark</span>`;
  } else {
    document.documentElement.style.setProperty('background', 'linear-gradient(to bottom right, #f3e8ff, #e0d4ff)');
    document.getElementById('themeBtn').innerHTML = `<i class="fas fa-sun"></i> <span>Light</span>`;
  }
}
