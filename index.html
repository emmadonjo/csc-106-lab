<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA MODE | Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 2.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 3px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 2rem;
        }

        .hero-text {
            font-size: clamp(3.8rem, 15vw, 11rem);
            font-weight: 700;
            line-height: 0.85;
            letter-spacing: -6px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 60px rgba(255, 255, 255, 0.25);
        }

        .tagline {
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: 8px;
            text-transform: uppercase;
            max-width: 820px;
            opacity: 0.9;
            margin-top: 6rem;
        }

        footer {
            padding: 3rem 4rem 2rem;
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            opacity: 0.6;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"># AURA MODE</div>
        <div>HOME</div>
    </header>

    <main>
        <div class="hero-text"># AURA MODE</div>
        <div class="hero-text"># AURA MODE</div>
        
        <div class="tagline">
            GLOBAL FASHION HOUSE — NEW PIECES ADDED WEEKLY — PARIS SHOWROOM NOW OPEN
        </div>
    </main>

    <footer>
        AURA MODE © 2026 — ALL RIGHTS RESERVED
    </footer>
</body>
</html>
