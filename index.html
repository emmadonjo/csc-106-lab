<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lex AI Chatbot</title>
    <link rel="icon" href="path_to_lex_logo.png" type="image/png">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 300px;
        }
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .logo {
            width: 40px;
            height: 40px;
            margin-right: 10px;
        }
        .messages {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .user-input {
            display: flex;
        }
        .user-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .user-input button {
            padding: 10px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <img class="logo" src="path_to_lex_logo.png" alt="Lex Logo">
            <h2>Lex AI Chatbot</h2>
        </div>
        <div class="messages" id="messages"></div>
        <div class="user-input">
            <input type="text" id="userMessage" placeholder="Type your message...">
            <button id="sendButton">Send</button>
        </div>
    </div>
    <script>
        const messagesDiv = document.getElementById('messages');
        const userMessageInput = document.getElementById('userMessage');
        const sendButton = document.getElementById('sendButton');
        
        sendButton.onclick = () => {
            const userMessage = userMessageInput.value;
            if (userMessage) {
                messagesDiv.innerHTML += <div>User: ${userMessage}</div>;
                userMessageInput.value = '';
                // Here, you would typically send the message to the chatbot API and get a response
                // For now, we'll simulate a response:
                setTimeout(() => {
                    messagesDiv.innerHTML += <div>Lex AI: This is a simulated response!</div>;
                    messagesDiv.scrollTop = messagesDiv.scrollHeight; // Scroll to the bottom
                }, 1000);
            }
        }
    </script>
</body>
</html>
